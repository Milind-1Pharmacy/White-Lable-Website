# buildspec.yml — AWS CodeBuild recipe for building ONE tenant's site.
#
# Backend-oriented: the backend writes the tenant's AppConfig to a small S3 object,
# then calls codebuild.start_build with the slug + bucket. CodeBuild runs:
#   1. install deps (cached)            2. pull configs/<slug>.json from S3
#   3. TENANT=<slug> next build → ./out 4. sync ./out to the site bucket + invalidate CF
#
# Env vars the backend passes via environmentVariablesOverride on start_build:
#   TENANT         tenant slug (e.g. "urmedz") — the build target + config filename
#   CONFIG_S3_URI  s3://<configs-bucket>/<slug>.json — where the backend wrote the AppConfig
#   BUCKET         the tenant's S3 SITE bucket (e.g. "urmedz.1pharmacy.io")
#   DISTRIBUTION   optional — CloudFront distribution id to invalidate (may be empty)
#   BRANCH         optional — only used by the install-phase fallback below; defaults to main
#
# WHY S3, not an env var: a full AppConfig easily exceeds CodeBuild's start_build /
# env-var size limits, so the config travels via S3 and only small scalars are env vars.
#
# Which branch is built:
#   PREFERRED — pass `sourceVersion` to start_build ("main" / a branch / a commit SHA);
#   CodeBuild checks it out before this file runs. The BRANCH env var below is only a
#   fallback for workflows that do NOT set sourceVersion (no-op when BRANCH is unset).

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      # OPTIONAL branch checkout — runs FIRST. No-op unless BRANCH is set (use
      # sourceVersion on start_build instead where possible).
      - |
        if [ -d .git ] && [ -n "${BRANCH:-}" ]; then
          echo "Checking out branch: $BRANCH"
          git fetch --depth 1 origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
        else
          echo "Using the source CodeBuild already checked out (sourceVersion / project default)."
        fi
      # Skip dev tooling (eslint/vitest) — not needed to build. Cached node_modules
      # makes this near-instant on repeat builds.
      - npm ci --omit=dev

  pre_build:
    commands:
      # Download this tenant's config from S3 into the configs folder.
      - aws s3 cp "$CONFIG_S3_URI" "configs/$TENANT.json"

  build:
    commands:
      # Build ONLY this tenant. next build reads process.env.TENANT → configs/$TENANT.json
      # (lib/getConfig.ts) and emits a static site to ./out.
      - TENANT="$TENANT" npm run build

  post_build:
    commands:
      # Upload the built site to the tenant's S3 bucket.
      - aws s3 sync out/ "s3://$BUCKET" --delete
      # Invalidate CloudFront if a distribution id was provided.
      - |
        if [ -n "${DISTRIBUTION:-}" ]; then
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION" --paths "/*"
        fi

cache:
  paths:
    - 'node_modules/**/*'
