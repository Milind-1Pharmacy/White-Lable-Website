# buildspec.yml — AWS CodeBuild recipe for building ONE tenant's site.
#
# Backend-oriented: the backend writes the tenant's AppConfig to a small S3 object,
# then calls codebuild.start_build with the slug + bucket. CodeBuild runs:
#   1. install deps (cached)   2. pull config from S3 + provision the site bucket
#   3. STATIC_EXPORT build → ./out   4. sync ./out to the site bucket + invalidate CF
#
# Env vars the backend passes via environmentVariablesOverride on start_build:
#   TENANT         tenant slug (e.g. "urmedz") — the build target + config filename
#   CONFIG_S3_URI  s3://<configs-bucket>/<slug>.json — where the backend wrote the AppConfig
#   BUCKET         the tenant's S3 SITE bucket (e.g. "urmedz.1pharmacy.io")
#   AWS_REGION     bucket region for create-bucket (defaults to ap-south-1 below)
#   DISTRIBUTION   optional — CloudFront distribution id to invalidate (may be empty)
#   BRANCH         optional — only used by the install-phase fallback below; defaults to main
#
# WHY S3, not an env var: a full AppConfig easily exceeds CodeBuild's start_build /
# env-var size limits, so the config travels via S3 and only small scalars are env vars.
#
# Which branch is built:
#   PREFERRED — pass `sourceVersion` to start_build ("main" / a branch / a commit SHA);
#   CodeBuild checks it out before this file runs. The BRANCH env var below is only a
#   fallback for workflows that do NOT set sourceVersion (no-op when BRANCH is unset).

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      # OPTIONAL branch checkout — runs FIRST. No-op unless BRANCH is set (use
      # sourceVersion on start_build instead where possible).
      - |
        if [ -d .git ] && [ -n "${BRANCH:-}" ]; then
          echo "Checking out branch: $BRANCH"
          git fetch --depth 1 origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
        else
          echo "Using the source CodeBuild already checked out (sourceVersion / project default)."
        fi
      # Full install. NOTE: `next build` needs build-time tooling at runtime —
      # @tailwindcss/postcss + tailwindcss (CSS) and typescript + @types/* (the
      # build type-checks). Those now live in `dependencies` (not devDependencies)
      # so the build survives even an `npm ci --omit=dev`.
      #
      # Wipe node_modules FIRST so a poisoned CACHE can't shadow this install: an
      # earlier `npm ci --omit=dev` run cached a tree WITHOUT @tailwindcss/postcss,
      # and a restored stale cache makes the build fail "Cannot find module
      # @tailwindcss/postcss" even though package.json is correct. `npm ci` already
      # prunes, but removing the dir defends against a cache restored over the top.
      - rm -rf node_modules
      - npm ci
      # Fail FAST with a clear message if the critical build dep is still missing,
      # instead of letting it surface later as an opaque Turbopack/PostCSS error.
      - node -e "require.resolve('@tailwindcss/postcss')" && echo "OK: @tailwindcss/postcss present"

  pre_build:
    commands:
      # Download this tenant's config from S3 into the configs folder.
      - aws s3 cp "$CONFIG_S3_URI" "configs/$TENANT.json"
      # Self-provision the tenant's PUBLIC site bucket on first publish so a brand-new
      # tenant deploys with no manual AWS setup. All three are idempotent (re-publishing
      # an existing tenant is a no-op): create the bucket (|| true swallows
      # "already owned by you"), drop the block-public-access guards, then attach a
      # read-only public-object policy so the static site is served straight from S3.
      # NOTE: only needed when the bucket is served via the S3 *website* endpoint. If a
      # tenant is fronted by CloudFront + OAC, the bucket should stay PRIVATE and these
      # three commands should be skipped for it (see docs/deploy-security-headers.md).
      - aws s3api create-bucket --bucket "$BUCKET" --region "${AWS_REGION:-ap-south-1}" --create-bucket-configuration "LocationConstraint=${AWS_REGION:-ap-south-1}" || true
      - aws s3api put-public-access-block --bucket "$BUCKET" --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
      - aws s3api put-bucket-policy --bucket "$BUCKET" --policy "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"arn:aws:s3:::$BUCKET/*\"}]}"

  build:
    commands:
      # Build ONLY this tenant as a STATIC export. STATIC_EXPORT=1 flips
      # next.config.ts into `output: "export"` (the builder on Vercel leaves it
      # unset and builds dynamically). TENANT selects configs/$TENANT.json
      # (lib/getConfig.ts); the static site is emitted to ./out.
      - STATIC_EXPORT=1 TENANT="$TENANT" npm run build

  post_build:
    commands:
      # Upload the built site to the tenant's S3 bucket.
      - aws s3 sync out/ "s3://$BUCKET" --delete
      # Invalidate CloudFront if a distribution id was provided.
      - |
        if [ -n "${DISTRIBUTION:-}" ]; then
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION" --paths "/*"
        fi

cache:
  paths:
    - 'node_modules/**/*'
